spring:
  datasource:
    url: jdbc:mysql://localhost:3306/garage_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

security:
  jwt:
    secret: "my-super-secret-jwt-key-my-super-secret-jwt-key"
    expiration-ms: 86400000

payment:
  stripe:
    secret-key: "${STRIPE_SECRET_KEY:}"

maintenance:
  cleanup:
    cron: "0 0 3 * * *"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
